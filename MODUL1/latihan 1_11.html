<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Halaman dengan Iframe dan Link</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1, h2, h3, h4 {
            margin: 5px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        td {
            vertical-align: top;
            padding: 10px;
        }
        .kiri {
            width: 20%;
            background-color: #f9f9f9;
        }
        .kanan {
            width: 70%;
        }
        .kosong {
            width: 10%;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 8px;
        }
        a {
            text-decoration: none;
            color: #0066cc;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Heading Dengan H1</h1>
    <h2>Heading Dengan H2</h2>
    <h3>Heading Dengan H3</h3>
    <h4>Heading Dengan H4</h4>

    <table>
        <tr>
            <td class="kiri">
                <ul>
                    <li><a href="latihan 1_1.html" target="iframe_konten">Halaman 1</a></li>
                    <li><a href="latihan 1_2.html" target="iframe_konten">Halaman 2</a></li>
                    <li><a href="latihan 1_3.html" target="iframe_konten">Halaman 3</a></li>
                    <li><a href="latihan 1_4.html" target="iframe_konten">Halaman 4</a></li>
                    <li><a href="latihan 1_5.html" target="iframe_konten">Halaman 5</a></li>
                    <li><a href="latihan 1_6.html" target="iframe_konten">Halaman 6</a></li>
                    <li><a href="latihan 1_7.html" target="iframe_konten">Halaman 7</a></li>
                    <li><a href="latihan 1_8.html" target="iframe_konten">Halaman 8</a></li>
                    <li><a href="latihan 1_9.html" target="iframe_konten">Halaman 9</a></li>
                    <li><a href="latihan 1_10.html" target="iframe_konten">Halaman 10</a></li>
                </ul>
            </td>
            <td class="kanan">
                <iframe name="iframe_konten" src="halaman1.html" frameborder="0"></iframe>
            </td>
            <td class="kosong"></td>
        </tr>
    </table>
</body>
</html>
