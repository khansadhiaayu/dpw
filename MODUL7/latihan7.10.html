<!DOCTYPE html>
<html>
<head>
<title>Dialog jQuery</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){
    $("#dialog").hide();

    $("#buka").click(function(){
        $("#dialog").show();
    });

    $("#tutup").click(function(){
        $("#dialog").hide();
    });
});
</script>

</head>
<body>

<button id="buka">Buka Dialog</button>

<div id="dialog" style="border:1px solid black; padding:10px; width:200px;">
    Ini adalah dialog sederhana
    <br><br>
    <button id="tutup">Tutup</button>
</div>

</body>
</html>
