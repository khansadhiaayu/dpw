<!DOCTYPE html>
<html>
<head>
<title>Input Data</title>
<script>
function inputData() {
    var nama = prompt("Masukkan nama Anda:");
    document.getElementById("hasil").innerHTML = "Halo, " + nama;
}
</script>
</head>
<body>

<button onclick="inputData()">Input Nama</button>
<p id="hasil"></p>

</body>
</html>
