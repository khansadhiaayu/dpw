<!DOCTYPE html>
<html>
<head>
<title>Confirm Box</title>
<script>
function konfirmasi() {
    var hasil = confirm("Apakah Anda yakin?");
    if (hasil) {
        alert("Anda memilih OK");
    } else {
        alert("Anda memilih Cancel");
    }
}
</script>
</head>
<body>

<button onclick="konfirmasi()">Klik Konfirmasi</button>

</body>
</html>
