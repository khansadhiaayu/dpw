<!DOCTYPE html>
<html>
<head>
<title>Validasi Form</title>
<script>
function validasi() {
    var nama = document.forms["form1"]["nama"].value;
    if (nama == "") {
        alert("Nama tidak boleh kosong!");
        return false;
    }
}
</script>
</head>
<body>

<form name="form1" onsubmit="return validasi()">
    Nama: <input type="text" name="nama">
    <input type="submit" value="Kirim">
</form>

</body>
</html>
